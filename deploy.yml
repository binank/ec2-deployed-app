name: Deploy to EC2

on:
  push:
    branches:
      - main          # Trigger on every push to main

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Test
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────
  # JOB 2: Deploy (only runs if test passes)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test           # Won't run if test job fails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Write the EC2 private key to a temp file
      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

      # Step 2: Copy project files to EC2 (excludes node_modules)
      - name: Copy files to EC2
        run: |
          rsync -avz \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.github' \
            -e "ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/app/

      # Step 3: SSH into EC2 and run deployment commands
      - name: Deploy on EC2
        run: |
          ssh -i /tmp/ec2_key.pem \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            cd /home/$USER/app

            echo "📦 Installing dependencies..."
            npm ci --omit=dev

            echo "🔄 Restarting app with PM2..."
            export DEPLOY_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            export NODE_ENV=production
            export APP_VERSION="${{ github.sha }}"

            # Start or reload with PM2
            if pm2 list | grep -q "my-app"; then
              pm2 reload my-app --update-env
            else
              pm2 start src/app.js \
                --name my-app \
                --env production \
                -e /home/$USER/app/logs/err.log \
                -o /home/$USER/app/logs/out.log
            fi

            pm2 save
            echo "✅ Deployment complete!"
          EOF

      # Step 4: Health check — verify the app is up
      - name: Health Check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}:3000/health)
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Health check failed! HTTP status: $STATUS"
            exit 1
          fi
          echo "✅ Health check passed! App is live."

      # Step 5: Cleanup sensitive key
      - name: Cleanup SSH Key
        if: always()
        run: rm -f /tmp/ec2_key.pem
